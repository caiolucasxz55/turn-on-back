version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: musicapp-postgres
    environment:
      POSTGRES_DB: turnon
      POSTGRES_USER: turnon
      POSTGRES_PASSWORD: turnon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - musicapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnon -d turnon"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicapp-back
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://turnon.database.windows.net:1433;database=turnon;user=turnon@turnon;password=turnon;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;"
      SPRING_DATASOURCE_USERNAME: turnon@turnon
      SPRING_DATASOURCE_PASSWORD: turnon
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - musicapp-network

volumes:
  postgres_data:

networks:
  musicapp-network:
    driver: bridge
